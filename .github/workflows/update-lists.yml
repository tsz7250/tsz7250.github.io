name: Update Portfolio Project Lists

on:
  schedule:
    - cron: '0 0 * * 0' # 每週日午夜 (00:00) 自動執行一次
  workflow_dispatch: # 支援手動立即執行

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_portfolio.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md index.html assets/js/main.js
          if git diff --cached --quiet; then
            echo "沒有任何變更，跳過 Commit。"
          else
            git commit -m "Auto-update portfolio project lists from GitHub Lists [skip ci]"
            git push
          fi
